<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Harian Guru - SMAN 15 Maluku Tengah</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; }
        
        .panel-container { width: 100%; max-width: 850px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin-bottom: 30px; }
        .header-panel { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #3b82f6; padding-bottom: 15px; }
        .header-panel h3 { color: #3b82f6; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
        .header-panel h1 { color: #ffffff; font-size: 24px; font-weight: 800; }
        .header-panel p { color: #94a3b8; font-size: 13px; margin-top: 5px; font-style: italic; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 600px) { .form-grid { grid-template-columns: repeat(2, 1fr); } .full-width { grid-column: span 2; } }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #cbd5e1; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #3b82f6; border-radius: 8px; color: #ffffff; font-size: 14px; outline: none; }
        select.form-control { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%233b82f6'><polygon points='0,0 10,0 5,5'/></svg>"); background-repeat: no-repeat; background-position: right 15px center; }
        textarea.form-control { height: 75px; resize: none; }
        
        .absensi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .absensi-row .form-control { padding: 10px 5px; text-align: center; }
        
        .btn-submit { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 8px; color: #ffffff; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: #2563eb; }
        
        /* Panel Tabel */
        .history-container { width: 100%; max-width: 850px; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; }
        .history-header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-title { color: #ffffff; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .history-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: #10b981; border-radius: 2px; }
        
        .btn-pdf { padding: 8px 16px; background: #10b981; border: none; border-radius: 6px; color: white; font-size: 13px; font-weight: 700; cursor: pointer; }
        .btn-pdf:disabled { background: #64748b; cursor: not-allowed; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; font-size: 13px; color: #cbd5e1; }
        th { background: #0f172a; color: #94a3b8; padding: 12px 10px; border-bottom: 2px solid rgba(255, 255, 255, 0.1); text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); vertical-align: top; }
        
        /* MODAL POPUP UNTUK NIP & TTD DIGITAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; display: none; }
        .modal-box { background: #1e293b; border: 1px solid #3b82f6; border-radius: 12px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .modal-box h3 { color: #fff; margin-bottom: 15px; font-size: 18px; text-align: center; }
        .signature-canvas { background: #ffffff; border: 2px dashed #3b82f6; border-radius: 6px; cursor: crosshair; width: 100%; height: 150px; margin-top: 10px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn-modal { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-modal.primary { background: #3b82f6; color: white; }
        .btn-modal.secondary { background: #64748b; color: white; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 8px; color: white; font-weight: 600; display: none; z-index: 10000; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
    </style>
</head>
<body>

    <div class="panel-container">
        <div class="header-panel">
            <h3>Jurnal Harian Guru</h3>
            <h1>SMA NEGERI 15 MALUKU TENGAH</h1>
            <p>Jln Sugiarto Puncak Masohi</p>
        </div>

        <form id="jurnalForm" onsubmit="submitForm(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label>Tanggal Mengajar</label>
                    <input type="date" id="tanggal" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Pertemuan Ke-</label>

                    <label>Nama Guru</label>

                <div class="form-group">

                        <option value="" disabled selected>Memuat mata pelajaran...</option>

                </div>
                <div class="form-group">
                    <label>Kelas</label>
                    <select id="kelas" class="form-control" required>
                        <option value="" disabled selected>Memuat kelas...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status Ketuntasan</label>
                    <select id="status" class="form-control" required>
                        <option value="" disabled selected>Pilih Status</option>

                </div>
                <div class="form-group full-width">
                    <label>Kehadiran Siswa</label>
                    <div class="absensi-row">
                        <div><label style="font-size:11px;color:#cbd5e1">Hadir</label><input type="number" id="hadir" min="0" value="0" class="form-control" required></div>
                        <div><label style="font-size:11px;color:#cbd5e1">Izin</label><input type="number" id="izin" min="0" value="0" class="form-control" required></div>
                        <div><label style="font-size:11px;color:#cbd5e1">Sakit</label><input type="number" id="sakit" min="0" value="0" class="form-control" required></div>
                        <div><label style="font-size:11px;color:#cbd5e1">Alpa</label><input type="number" id="alpa" min="0" value="0" class="form-control" required></div>
                    </div>

    <div class="history-container">
        <div class="history-header-box">
            <div class="history-title" id="judulRiwayat">Riwayat Jurnal Mengajar</div>
            <button id="btnUnduhPdf" class="btn-pdf" onclick="bukaModalNip()" disabled>🖨️ Cetak PDF Riwayat</button>
        </div>
        <div class="table-responsive">
            <table id="riwayatTabel">
                <thead>
                    <tr>
                        <th style="width: 100px;">TANGGAL</th>
                        <th style="width: 80px;">KELAS</th>
                        <th style="width: 60px;">PERT.</th>
                        <th>MATERI POKOK</th>
                        <th style="width: 180px;">KEHADIRAN</th>
                    </tr>
                </thead>
                <tbody id="riwayatBody">
                    <tr><td colspan="5" style="text-align: center; color: #64748b; padding: 20px;">Silakan pilih nama guru untuk melihat riwayat.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalNip" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle">Verifikasi Identitas</h3>
            
            <div id="stepNip">
                <div class="form-group">
                    <label>Masukkan NIP Guru :</label>
                    <input type="text" id="nipInput" class="form-control" placeholder="Contoh: 197307011999031003" required>
                </div>
                <div class="modal-buttons">
                    <button class="btn-modal secondary" onclick="tutupModal()">Batal</button>
                    <button class="btn-modal primary" onclick="lanjutKeTtd()">Lanjut TTD</button>
                </div>
            </div>

            <div id="stepTtd" style="display: none;">
                <label style="color:#cbd5e1; font-size:13px;">Goreskan Tanda Tangan Anda di Bawah Ini:</label>
                <canvas id="signaturePad" class="signature-canvas"></canvas>
                <div class="modal-buttons">
                    <button class="btn-modal secondary" onclick="clearCanvas()">Hapus TTD</button>
                    <button class="btn-modal primary" onclick="prosesUnduhFinal()">Unduh Berkas PDF</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbyPilNg5FpHwO2BvNeVGt1yzOHKcCZaBqf1aI3l4_HfI3FIM_rVQslxT8WGwfPdKIzl/exec";
        let listRiwayatGuru = [];
        let canvas, ctx, isDrawing = false;
        let nipGuruTerinput = "";

        // Fungsi pembentuk tanggal format YYYY-MM-DD sesuai zona waktu lokal perangkat Anda
        function dapatkanTanggalLokal() {
            const lokal = new Date();
            const tahun = lokal.getFullYear();
            const bulan = String(lokal.getMonth() + 1).padStart(2, '0');
            const tgl = String(lokal.getDate()).padStart(2, '0');
            return `${tahun}-${bulan}-${tgl}`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Menggunakan tanggal lokal perangkat murni (Akurat WIB / WITA / WIT)
            document.getElementById('tanggal').value = dapatkanTanggalLokal();
            ambilDataDropdown();
            initCanvasTtd();
        });

        // ✅ PERBAIKAN: Menggunakan URLSearchParams (application/x-www-form-urlencoded) untuk memotong CORS Preflight
        function ambilDataDropdown() {
            const params = new URLSearchParams();
            params.append('aksi', 'AMBIL_DROPDOWN');

            fetch(URL_WEB_APP, { 
                method: "POST", 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params 
            })
            .then(res => res.json())
            .then(res => { 
                if (res.status === "SUCCESS") {
                    populateDropdowns(res.data);
                } else {
                    console.error("Server return error:", res);
                }
            })
            .catch(err => {
                console.error("Gagal memuat dropdown via Form-Encoded:", err);
            });
        }

        function populateDropdowns(data) {
            setupSelect('guru', data.gurus, 'Pilih Nama Guru');
            setupSelect('mapel', data.mapels, 'Pilih Mata Pelajaran');
            setupSelect('kelas', data.kelas, 'Pilih Kelas');
        }

        function setupSelect(id, items, defaultText) {
            const select = document.getElementById(id);
            select.innerHTML = `<option value="" disabled selected>${defaultText}</option>`;
            if(items) {
                items.forEach(item => { 
                    let opt = document.createElement('option'); 
                    opt.value = item; 
                    opt.textContent = item; 
                    select.appendChild(opt); 
                });
            }
        }

        // ✅ PERBAIKAN: Proteksi pemanggilan data riwayat dengan URLSearchParams agar bebas hambatan CORS
        function loadRiwayatOtomatis() {
            const namaGuru = document.getElementById('guru').value;
            if(!namaGuru) return;

            const tbody = document.getElementById('riwayatBody');
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #3b82f6; padding: 20px;">Menarik data log riwayat ${namaGuru}...</td></tr>`;
            document.getElementById('btnUnduhPdf').disabled = true;

            const params = new URLSearchParams();
            params.append('aksi', 'AMBIL_RIWAYAT_GURU');
            params.append('guru', namaGuru);

            fetch(URL_WEB_APP, {
                method: "POST",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "SUCCESS" && res.data.length > 0) {
                    listRiwayatGuru = res.data;
                    document.getElementById('btnUnduhPdf').disabled = false;
                    renderTabelRiwayat(res.data);
                } else {
                    listRiwayatGuru = [];
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #64748b; padding: 20px;">Belum ada riwayat mengajar untuk guru ini.</td></tr>`;
                }
            }).catch((err) => {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444; padding: 20px;">Gagal memuat riwayat server.</td></tr>`;
            });
        }

        function renderTabelRiwayat(data) {
            const tbody = document.getElementById('riwayatBody');
            tbody.innerHTML = "";
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.tanggal}</td>
                    <td>${item.kelas}</td>
                    <td style="text-align:center;">${item.pertemuan}</td>
                    <td><b>${item.materi}</b></td>
                    <td>H:${item.hadir}, S:${item.sakit}, I:${item.izin}, A:${item.alpa}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ✅ PERBAIKAN: Penyelarasan submitForm dengan parameter URLSearchParams
        function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            btn.textContent = 'Menyimpan...'; btn.disabled = true;

            const formData = {
                tanggal: document.getElementById('tanggal').value,
                pertemuan: document.getElementById('pertemuan').value,
                guru: document.getElementById('guru').value,
                mapel: document.getElementById('mapel').value,
                kelas: document.getElementById('kelas').value,
                status: document.getElementById('status').value,
                materi: document.getElementById('materi').value,
                tujuan: document.getElementById('tujuan').value,
                hadir: document.getElementById('hadir').value,
                izin: document.getElementById('izin').value,
                sakit: document.getElementById('sakit').value,
                alpa: document.getElementById('alpa').value,
                catatan: document.getElementById('catatan').value
            };

            const params = new URLSearchParams();
            params.append('aksi', 'SIMPAN_JURNAL');
            params.append('formData', JSON.stringify(formData));

            fetch(URL_WEB_APP, { 
                method: "POST", 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === "SUCCESS") {
                showToast(res.message, 'success');
                document.getElementById('jurnalForm').reset();
                document.getElementById('tanggal').value = dapatkanTanggalLokal(); // <--- Diganti ke fungsi lokal baru
                loadRiwayatOtomatis(); 
            }
                btn.textContent = 'SIMPAN JURNAL'; btn.disabled = false;
            }).catch((err) => { 
                console.error(err);
                showToast("Gagal menyimpan ke server", "error");
                btn.textContent = 'SIMPAN JURNAL'; btn.disabled = false; 
            });
        }

        /* WORKFLOW POPUP MODAL VALIDASI */
        function bukaModalNip() {
            document.getElementById('modalNip').style.display = 'flex';
            document.getElementById('stepNip').style.display = 'block';
            document.getElementById('stepTtd').style.display = 'none';
            document.getElementById('modalTitle').textContent = "Input NIP Validasi";
            document.getElementById('nipInput').value = "";
            clearCanvas();
        }

        document.getElementById('modalNip').addEventListener('click', function(e) {
            if(e.target === this) { tutupModal(); }
        });

        function tutupModal() { document.getElementById('modalNip').style.display = 'none'; }

        function lanjutKeTtd() {
            nipGuruTerinput = document.getElementById('nipInput').value.trim();
            if(!nipGuruTerinput) { alert("NIP tidak boleh kosong!"); return; }
            
            document.getElementById('stepNip').style.display = 'none';
            document.getElementById('stepTtd').style.display = 'block';
            document.getElementById('modalTitle').textContent = "Bubuhkan Tanda Tangan";
            resizeCanvas();
        }

        /* INISIALISASI CANVAS UNTUK GOAL TTD DIGITAL */
        /* INISIALISASI CANVAS UNTUK GOAL TTD DIGITAL (OPTIMAL UNTUK HP & DESKTOP) */
function initCanvasTtd() {
    canvas = document.getElementById('signaturePad');
    ctx = canvas.getContext('2d');
    
    // Fungsi presisi menangkap koordinat baik Mouse maupun Touchscreen HP
    function getEventPos(e) {
        let rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        
        // Cek apakah ini event sentuhan HP atau klik mouse
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        // Menghitung posisi murni koordinat pada element canvas
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDrawing(e) { 
        isDrawing = true; 
        let pos = getEventPos(e); 
        ctx.beginPath(); 
        ctx.moveTo(pos.x, pos.y); 
        
        // Mencegah layar HP ikut tergulung/scroll saat menggores TTD
        if(e.cancelable) e.preventDefault(); 
    }

    function draw(e) { 
        if(!isDrawing) return; 
        let pos = getEventPos(e); 
        ctx.lineTo(pos.x, pos.y); 
        ctx.stroke(); 
        
        if(e.cancelable) e.preventDefault(); 
    }

    function stopDrawing() { isDrawing = false; }

    // Event Listener khusus Desktop / Mouse
    canvas.addEventListener('mousedown', startDrawing); 
    canvas.addEventListener('mousemove', draw); 
    window.addEventListener('mouseup', stopDrawing);
    
    // Event Listener khusus HP / Touchscreen (Menggunakan opsi passive: false agar preventDefault bekerja)
    canvas.addEventListener('touchstart', startDrawing, { passive: false }); 
    canvas.addEventListener('touchmove', draw, { passive: false }); 
    window.addEventListener('touchend', stopDrawing);
    
    // Gaya goresan pena TTD agar lebih mulus
    ctx.strokeStyle = "#000000"; 
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round"; // Membuat ujung garis melingkar mulus
    ctx.lineJoin = "round"; // Membuat belokan garis tidak patah-patah
}

// Mengatur ulang ukuran canvas agar mengikuti resolusi rasio layar HP
function resizeCanvas() { 
    const ratio = window.devicePixelRatio || 1;
    
    // Simpan dulu ukuran asli element css
    const widthAsli = canvas.offsetWidth;
    const heightAsli = canvas.offsetHeight;
    
    // Kalibrasi resolusi internal canvas berdasarkan kerapatan pixel layar HP
    canvas.width = widthAsli * ratio;
    canvas.height = heightAsli * ratio;
    
    // Kembalikan skala konteks gambar agar ukurannya pas di layar
    ctx.scale(ratio, ratio);
    
    // Setel ulang properti kuas penanda setelah canvas di-resize
    ctx.strokeStyle = "#000000"; 
    ctx.lineWidth = 2.5; 
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
}

        // ✅ PROSES GENERATE FILE PDF SESUAI PERSIS LAYOUT DOKUMEN image_8e829f.png
        function prosesUnduhFinal() {
            if(listRiwayatGuru.length === 0) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
            const fontSistem = "courier";
            
            const profil = listRiwayatGuru[0];
            
            // 1. KOP BESAR SEKOLAH
            doc.setFont(fontSistem, "bold"); doc.setFontSize(14);
            doc.text("SMA NEGERI 15 MALUKU TENGAH", 148, 12, { align: "center" });
            doc.setFont(fontSistem, "normal"); doc.setFontSize(9);
            doc.text("JL. SUGIATO PUNCAK-LETWARU-KEC. KOTA MASOHI ", 148, 17, { align: "center" });
            
            doc.setLineWidth(0.5); doc.setLineDashPattern([1.5, 1.5], 0);
            doc.line(15, 20, 282, 20); 
            doc.setLineDashPattern([], 0); 
            
            // 2. BAGIAN INFORMASI IDENTITAS KIRI ATAS
            doc.setFont(fontSistem, "bold"); doc.setFontSize(10);
            doc.text("DOKUMEN        :", 15, 28);
            doc.text("NAMA GURU      :", 15, 34);
            doc.text("MATA PELAJARAN :", 15, 40);
            
            doc.setFont(fontSistem, "normal");
            doc.text("LAPORAN JURNAL HARIAN PEMBELAJARAN", 55, 28);
            doc.text(profil.guru.toUpperCase(), 55, 34);
            doc.text(profil.mapel.toUpperCase(), 55, 40);
            
            // 3. PEMBUATAN TABEL DATA JURNAL MENGGUNAKAN AUTOTABLE
            const isiTabelMap = listRiwayatGuru.map(item => [
                item.tanggal,
                item.kelas,
                item.pertemuan,
                item.materi.toUpperCase(),
                `H:${item.hadir},S:${item.sakit},I:${item.izin},A:${item.alpa}`
            ]);

            doc.autoTable({
                startY: 46,
                margin: { left: 15, right: 15 },
                head: [["TANGGAL", "KELAS", "PERTEMUAN", "MATERI POKOK", "KEHADIRAN"]],
                body: isiTabelMap,
                theme: "grid",
                styles: { font: fontSistem, fontSize: 9, cellPadding: 3, textColor: [0, 0, 0], lineColor: [0, 0, 0], lineWidth: 0.2 },
                headStyles: { fillColor: [240, 244, 248], fontStyle: "bold", textColor: [0, 0, 0] },
                columnStyles: {
                    0: { cellWidth: 35 },
                    1: { cellWidth: 25 },
                    2: { cellWidth: 30, halign: 'center' },
                    3: { cellWidth: 110 },
                    4: { cellWidth: 62 }
                }
            });
            
            let barisAkhirTabel = doc.autoTable.previous.finalY + 15;
            if (barisAkhirTabel > 160) { doc.addPage(); barisAkhirTabel = 25; }
            
            // 4. BOTTOM AREA: TANDA TANGAN KEPSEK & GURU
            doc.setFont(fontSistem, "normal"); doc.setFontSize(10);
            
            // Sisi Kiri (Kepala Sekolah)
            doc.text("MENGETAHUI,", 15, barisAkhirTabel);
            doc.text("KEPALA SEKOLAH SMAN 15 MALTENG", 15, barisAkhirTabel + 5);
            
            doc.setFont(fontSistem, "bold");
            doc.text("ZAINUDIN PELU, M.PD", 15, barisAkhirTabel + 27);
            doc.setFont(fontSistem, "normal");
            doc.text("NIP. 19690529 199512 1 004", 15, barisAkhirTabel + 32);
            
            // Sisi Kanan (Guru Bersangkutan)
            doc.text("MALUKU TENGAH, " + ekspresikanTanggalSekarang(), 200, barisAkhirTabel);
            doc.text("GURU MATA PELAJARAN,", 200, barisAkhirTabel + 5);
            
            // Menggambar TTD dari Canvas
            const dataImgTtd = canvas.toDataURL("image/png");
            doc.addImage(dataImgTtd, 'PNG', 200, barisAkhirTabel + 8, 35, 15);
            
            doc.setFont(fontSistem, "bold");
            doc.text(profil.guru.toUpperCase(), 200, barisAkhirTabel + 27);
            doc.setFont(fontSistem, "normal");
            doc.text("NIP. " + nipGuruTerinput, 200, barisAkhirTabel + 32);
            
            doc.save(`Jurnal_${profil.guru.replace(/\s+/g, '_')}.pdf`);
            tutupModal();
            showToast("File Jurnal Pembelajaran Berhasil Diunduh!", "success");
        }

        function ekspresikanTanggalSekarang() {
            const bulanIndo = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
            const d = new Date();
            return `${d.getDate()} ${bulanIndo[d.getMonth()]} ${d.getFullYear()}`;
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast'); toast.textContent = msg;
            toast.className = `toast ${type}`; toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
